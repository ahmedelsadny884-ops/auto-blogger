name: Auto Blogger

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل المشروع
        uses: actions/checkout@v3

      - name: تثبيت بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: تثبيت المكتبات
        run: pip install requests

      - name: تشغيل السكريبت
        run: python auto_blogger.py
